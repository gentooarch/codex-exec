name: Build FreeBSD codex-exec

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-freebsd-exec-slim.yml"
      - "build-freebsd-exec-local.patch"

permissions:
  contents: read

jobs:
  build:
    name: x86_64-unknown-freebsd
    runs-on: ubuntu-latest

    env:
      CODEX_SOURCE_URL: https://github.com/openai/codex/archive/refs/tags/rust-v0.142.4.zip
      CODEX_SOURCE_DIR: codex-rust-v0.142.4
      TARGET: x86_64-unknown-freebsd
      RUST_TOOLCHAIN: 1.95.0
      CARGO_BUILD_JOBS: 1
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout patch
        uses: actions/checkout@v4

      - name: Build codex-exec in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          envs: "CODEX_SOURCE_URL CODEX_SOURCE_DIR TARGET RUST_TOOLCHAIN CARGO_BUILD_JOBS CARGO_TERM_COLOR"
          prepare: |
            pkg install -y curl ca_root_nss unzip cmake gmake perl5 pkgconf
          run: |
            set -eu

            PATCH_FILE="$(pwd)/build-freebsd-exec-local.patch"
            test -s "$PATCH_FILE"

            rm -rf "$CODEX_SOURCE_DIR" "$CODEX_SOURCE_DIR.zip" dist

            curl --proto '=https' --tlsv1.2 --fail --retry 3 -sSf \
              -o rustup-init.sh \
              https://sh.rustup.rs
            sh rustup-init.sh -y \
              --profile minimal \
              --default-toolchain "$RUST_TOOLCHAIN"
            . "$HOME/.cargo/env"

            curl -L --fail --retry 3 --retry-delay 5 \
              -o "$CODEX_SOURCE_DIR.zip" \
              "$CODEX_SOURCE_URL"
            unzip -q "$CODEX_SOURCE_DIR.zip"

            (
              cd "$CODEX_SOURCE_DIR/codex-rs"
              patch -p1 < "$PATCH_FILE"
              cargo build \
                --release \
                --package codex-exec \
                --bin codex-exec \
                --jobs "$CARGO_BUILD_JOBS"
            )

            strip -s "$CODEX_SOURCE_DIR/codex-rs/target/release/codex-exec"

            mkdir -p dist
            cp "$CODEX_SOURCE_DIR/codex-rs/target/release/codex-exec" \
              "dist/codex-exec-$TARGET"
            chmod +x "dist/codex-exec-$TARGET"
            rm -rf "$CODEX_SOURCE_DIR" "$CODEX_SOURCE_DIR.zip" rustup-init.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-exec-x86_64-unknown-freebsd
          path: dist/codex-exec-x86_64-unknown-freebsd
          if-no-files-found: error
