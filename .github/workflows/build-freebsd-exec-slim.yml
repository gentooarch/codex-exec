name: Build FreeBSD codex-exec

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-freebsd-exec-slim.yml"

permissions:
  contents: read

jobs:
  build:
    name: x86_64-unknown-freebsd
    runs-on: ubuntu-latest

    env:
      CODEX_SOURCE_URL: https://github.com/openai/codex/archive/refs/tags/rust-v0.142.4.zip
      CODEX_SOURCE_DIR: codex-rust-v0.142.4
      TARGET: x86_64-unknown-freebsd
      RUST_TOOLCHAIN: 1.95.0
      CARGO_BUILD_JOBS: 1
      CARGO_TERM_COLOR: always

    steps:
      - name: Build codex-exec in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          envs: "CODEX_SOURCE_URL CODEX_SOURCE_DIR TARGET RUST_TOOLCHAIN CARGO_BUILD_JOBS CARGO_TERM_COLOR"
          prepare: |
            pkg install -y curl ca_root_nss unzip cmake gmake perl5 pkgconf
          run: |
            set -eu

            rm -rf "$CODEX_SOURCE_DIR" "$CODEX_SOURCE_DIR.zip" dist

            curl --proto '=https' --tlsv1.2 --fail --retry 3 -sSf \
              -o rustup-init.sh \
              https://sh.rustup.rs
            sh rustup-init.sh -y \
              --profile minimal \
              --default-toolchain "$RUST_TOOLCHAIN" \
              --target "$TARGET" \
              --component rust-src
            . "$HOME/.cargo/env"

            curl -L --fail --retry 3 --retry-delay 5 \
              -o "$CODEX_SOURCE_DIR.zip" \
              "$CODEX_SOURCE_URL"
            unzip -q "$CODEX_SOURCE_DIR.zip"

            perl <<'EOF'
            use strict;
            use warnings;

            my $src = "$ENV{CODEX_SOURCE_DIR}/codex-rs/exec/src/event_processor_with_human_output.rs";
            open my $in, '<', $src or die "failed to read $src: $!";
            local $/;
            my $text = <$in>;
            close $in;

            my $changed = 0;

            my $helpers = <<'RUST';

            fn ring_terminal_bell() {
                let mut stderr = std::io::stderr();
                if std::io::IsTerminal::is_terminal(&stderr) {
                    let _ = std::io::Write::write_all(&mut stderr, b"\x07");
                    let _ = std::io::Write::flush(&mut stderr);
                }
            }

            fn cache_hit_rate_line(input_tokens: i64, cached_input_tokens: i64) -> String {
                let input = input_tokens.max(0);
                let cached = cached_input_tokens.max(0).min(input);
                if input == 0 {
                    return "cache hit: n/a (0 input tokens)".to_string();
                }

                let rate = cached as f64 * 100.0 / input as f64;
                format!(
                    "cache hit: {rate:.1}% ({}/{})",
                    codex_protocol::num_format::format_with_separators(cached),
                    codex_protocol::num_format::format_with_separators(input)
                )
            }
            RUST

            if ($text !~ /fn ring_terminal_bell\(/) {
                $text .= $helpers;
                $changed = 1;
            }

            if ($text !~ /cache_hit_rate_line\(notification\.token_usage\.last\.input_tokens/) {
                my $anchor = '                self.last_total_token_usage = Some(notification.token_usage);';
                my $replacement =
                    '                eprintln!("{}", cache_hit_rate_line(notification.token_usage.last.input_tokens, notification.token_usage.last.cached_input_tokens));' . "\n" .
                    $anchor;
                my $count = ($text =~ s/\Q$anchor\E/$replacement/g);
                die "expected exactly one token usage update anchor in $src, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /fn print_final_output\(&mut self\) \{\n        ring_terminal_bell\(\);/) {
                my $anchor = "    fn print_final_output(&mut self) {\n";
                my $replacement = $anchor . "        ring_terminal_bell();\n";
                my $count = ($text =~ s/\Q$anchor\E/$replacement/g);
                die "expected exactly one final output anchor in $src, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($changed) {
                open my $out, '>', $src or die "failed to write $src: $!";
                print {$out} $text;
                close $out;
            }
            EOF

            perl <<'EOF'
            use strict;
            use warnings;

            my @cargo_tomls = map { "$ENV{CODEX_SOURCE_DIR}/codex-rs/$_/Cargo.toml" } qw(
                keyring-store
                rmcp-client
            );

            for my $cargo_toml (@cargo_tomls) {
                open my $cargo_in, '<', $cargo_toml or die "failed to read $cargo_toml: $!";
                local $/;
                my $cargo = <$cargo_in>;
                close $cargo_in;

                my $cargo_changed = 0;

                my $freebsd_openbsd_block = <<'TOML';
            [target.'cfg(any(target_os = "freebsd", target_os = "openbsd"))'.dependencies]
            keyring = { workspace = true, features = ["sync-secret-service"] }
            TOML

                my $openbsd_only_block = <<'TOML';
            [target.'cfg(target_os = "openbsd")'.dependencies]
            keyring = { workspace = true, features = ["sync-secret-service"] }
            TOML

                if ($cargo =~ /\Q$freebsd_openbsd_block\E/) {
                    $cargo =~ s/\Q$freebsd_openbsd_block\E/$openbsd_only_block/;
                    $cargo_changed = 1;
                }

                my $freebsd_only_block = <<'TOML';
            [target.'cfg(target_os = "freebsd")'.dependencies]
            keyring = { workspace = true, features = ["sync-secret-service"] }
            TOML

                if ($cargo =~ /\Q$freebsd_only_block\E/) {
                    $cargo =~ s/\n?\Q$freebsd_only_block\E//;
                    $cargo_changed = 1;
                }

                if ($cargo_changed) {
                    open my $cargo_out, '>', $cargo_toml or die "failed to write $cargo_toml: $!";
                    print {$cargo_out} $cargo;
                    close $cargo_out;
                }
            }

            my $lib = "$ENV{CODEX_SOURCE_DIR}/codex-rs/keyring-store/src/lib.rs";
            open my $lib_in, '<', $lib or die "failed to read $lib: $!";
            local $/;
            my $text = <$lib_in>;
            close $lib_in;

            my $lib_changed = 0;

            if ($text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\nuse keyring::Entry;/) {
                my $count = ($text =~ s/^use keyring::Entry;\n/#[cfg(not(target_os = "freebsd"))]\nuse keyring::Entry;\n/m);
                die "expected one keyring Entry import in $lib, found $count\n" unless $count == 1;
                $lib_changed = 1;
            }

            my $freebsd_impl = <<'RUST';
            #[cfg(target_os = "freebsd")]
            const FREEBSD_KEYRING_UNAVAILABLE: &str =
                "keyring storage is unavailable in this FreeBSD codex-exec build";

            #[cfg(target_os = "freebsd")]
            impl KeyringStore for DefaultKeyringStore {
                fn load(&self, service: &str, account: &str) -> Result<Option<String>, CredentialStoreError> {
                    trace!("keyring.load unavailable on FreeBSD, service={service}, account={account}");
                    Ok(None)
                }

                fn save(&self, service: &str, account: &str, value: &str) -> Result<(), CredentialStoreError> {
                    trace!(
                        "keyring.save unavailable on FreeBSD, service={service}, account={account}, value_len={}",
                        value.len()
                    );
                    Err(CredentialStoreError::new(keyring::Error::NoStorageAccess(
                        Box::new(std::io::Error::other(FREEBSD_KEYRING_UNAVAILABLE)),
                    )))
                }

                fn delete(&self, service: &str, account: &str) -> Result<bool, CredentialStoreError> {
                    trace!("keyring.delete unavailable on FreeBSD, service={service}, account={account}");
                    Ok(false)
                }
            }

            #[cfg(not(target_os = "freebsd"))]
            RUST

            if ($text !~ /FREEBSD_KEYRING_UNAVAILABLE/) {
                my $anchor = "impl KeyringStore for DefaultKeyringStore {\n";
                my $replacement = $freebsd_impl . $anchor;
                my $count = ($text =~ s/\Q$anchor\E/$replacement/);
                die "expected one DefaultKeyringStore impl in $lib, found $count\n" unless $count == 1;
                $lib_changed = 1;
            }

            if ($lib_changed) {
                open my $lib_out, '>', $lib or die "failed to write $lib: $!";
                print {$lib_out} $text;
                close $lib_out;
            }
            EOF

            perl <<'EOF'
            use strict;
            use warnings;

            my $cargo_toml = "$ENV{CODEX_SOURCE_DIR}/codex-rs/model-provider/Cargo.toml";
            open my $cargo_in, '<', $cargo_toml or die "failed to read $cargo_toml: $!";
            local $/;
            my $cargo = <$cargo_in>;
            close $cargo_in;

            my $cargo_changed = 0;
            my $aws_dep = 'codex-aws-auth = { workspace = true }';
            my $freebsd_disabled_target = "[target.'cfg(not(target_os = \"freebsd\"))'.dependencies]";

            if ($cargo !~ /^\Q$freebsd_disabled_target\E\n\Q$aws_dep\E$/m) {
                my $removed = ($cargo =~ s/^\Q$aws_dep\E\n//m);
                die "expected one normal codex-aws-auth dependency in $cargo_toml, found $removed\n"
                    unless $removed == 1;

                if ($cargo =~ /^\Q$freebsd_disabled_target\E\n/m) {
                    my $count = ($cargo =~ s/^\Q$freebsd_disabled_target\E\n/$freebsd_disabled_target\n$aws_dep\n/m);
                    die "expected one FreeBSD-disabled target dependency table in $cargo_toml, found $count\n"
                        unless $count == 1;
                } elsif ($cargo =~ /\n\[dev-dependencies\]\n/) {
                    my $count = ($cargo =~ s/\n\[dev-dependencies\]\n/\n$freebsd_disabled_target\n$aws_dep\n\n[dev-dependencies]\n/);
                    die "expected one dev-dependencies table in $cargo_toml, found $count\n"
                        unless $count == 1;
                } else {
                    $cargo .= "\n$freebsd_disabled_target\n$aws_dep\n";
                }
                $cargo_changed = 1;
            }

            if ($cargo_changed) {
                open my $cargo_out, '>', $cargo_toml or die "failed to write $cargo_toml: $!";
                print {$cargo_out} $cargo;
                close $cargo_out;
            }

            my $lib = "$ENV{CODEX_SOURCE_DIR}/codex-rs/model-provider/src/lib.rs";
            open my $lib_in, '<', $lib or die "failed to read $lib: $!";
            local $/;
            my $lib_text = <$lib_in>;
            close $lib_in;

            my $lib_changed = 0;
            if ($lib_text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\nmod amazon_bedrock;/) {
                my $count = ($lib_text =~ s/^mod amazon_bedrock;\n/#[cfg(not(target_os = "freebsd"))]\nmod amazon_bedrock;\n/m);
                die "expected one amazon_bedrock module declaration in $lib, found $count\n"
                    unless $count == 1;
                $lib_changed = 1;
            }

            if ($lib_changed) {
                open my $lib_out, '>', $lib or die "failed to write $lib: $!";
                print {$lib_out} $lib_text;
                close $lib_out;
            }

            my $provider = "$ENV{CODEX_SOURCE_DIR}/codex-rs/model-provider/src/provider.rs";
            open my $provider_in, '<', $provider or die "failed to read $provider: $!";
            local $/;
            my $provider_text = <$provider_in>;
            close $provider_in;

            my $provider_changed = 0;
            if ($provider_text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\nuse crate::amazon_bedrock::AmazonBedrockModelProvider;/) {
                my $count = ($provider_text =~ s/^use crate::amazon_bedrock::AmazonBedrockModelProvider;\n/#[cfg(not(target_os = "freebsd"))]\nuse crate::amazon_bedrock::AmazonBedrockModelProvider;\n/m);
                die "expected one AmazonBedrockModelProvider import in $provider, found $count\n"
                    unless $count == 1;
                $provider_changed = 1;
            }

            my $old_create_model_provider = <<'RUST';
            pub fn create_model_provider(
                provider_info: ModelProviderInfo,
                auth_manager: Option<Arc<AuthManager>>,
            ) -> SharedModelProvider {
                if provider_info.is_amazon_bedrock() {
                    Arc::new(AmazonBedrockModelProvider::new(provider_info, auth_manager))
                } else {
                    Arc::new(ConfiguredModelProvider::new(provider_info, auth_manager))
                }
            }
            RUST

            my $new_create_model_provider = <<'RUST';
            pub fn create_model_provider(
                provider_info: ModelProviderInfo,
                auth_manager: Option<Arc<AuthManager>>,
            ) -> SharedModelProvider {
                #[cfg(target_os = "freebsd")]
                {
                    Arc::new(ConfiguredModelProvider::new(provider_info, auth_manager))
                }

                #[cfg(not(target_os = "freebsd"))]
                {
                    if provider_info.is_amazon_bedrock() {
                        Arc::new(AmazonBedrockModelProvider::new(provider_info, auth_manager))
                    } else {
                        Arc::new(ConfiguredModelProvider::new(provider_info, auth_manager))
                    }
                }
            }
            RUST

            if ($provider_text !~ /#\[cfg\(target_os = "freebsd"\)\]\n    \{\n        Arc::new\(ConfiguredModelProvider::new\(provider_info, auth_manager\)\)/) {
                my $count = ($provider_text =~ s/\Q$old_create_model_provider\E/$new_create_model_provider/);
                die "expected one create_model_provider implementation in $provider, found $count\n"
                    unless $count == 1;
                $provider_changed = 1;
            }

            if ($provider_changed) {
                open my $provider_out, '>', $provider or die "failed to write $provider: $!";
                print {$provider_out} $provider_text;
                close $provider_out;
            }
            EOF

            perl <<'EOF'
            use strict;
            use warnings;

            sub read_file {
                my ($path) = @_;
                open my $in, '<', $path or die "failed to read $path: $!";
                local $/;
                my $text = <$in>;
                close $in;
                return $text;
            }

            sub write_file {
                my ($path, $text) = @_;
                open my $out, '>', $path or die "failed to write $path: $!";
                print {$out} $text;
                close $out;
            }

            sub target_block_has_dep {
                my ($cargo, $target_header, $dep) = @_;
                my $start = index($cargo, "$target_header\n");
                return 0 if $start < 0;
                my $rest = substr($cargo, $start + length($target_header) + 1);
                my ($block) = split(/\n\[/, $rest, 2);
                return $block =~ /^\Q$dep\E$/m;
            }

            sub move_normal_dep_to_non_freebsd_target {
                my ($cargo_toml, $dep, @insert_before_tables) = @_;
                my $target_header = "[target.'cfg(not(target_os = \"freebsd\"))'.dependencies]";
                my $cargo = read_file($cargo_toml);
                return if target_block_has_dep($cargo, $target_header, $dep);

                my $removed = ($cargo =~ s/^\Q$dep\E\n//m);
                if ($removed == 0) {
                    warn "skipping FreeBSD dependency move for $dep in $cargo_toml: normal dependency not found\n";
                    return;
                }
                die "expected one normal dependency $dep in $cargo_toml, found $removed\n"
                    unless $removed == 1;

                if ($cargo =~ /^\Q$target_header\E\n/m) {
                    my $count = ($cargo =~ s/^\Q$target_header\E\n/$target_header\n$dep\n/m);
                    die "expected one FreeBSD-disabled target dependency table in $cargo_toml, found $count\n"
                        unless $count == 1;
                } else {
                    my $inserted = 0;
                    for my $table (@insert_before_tables, "[dev-dependencies]") {
                        my $anchor = "\n$table\n";
                        if ($cargo =~ /\Q$anchor\E/) {
                            my $count = ($cargo =~ s/\Q$anchor\E/\n$target_header\n$dep\n$anchor/);
                            die "expected one insertion anchor $table in $cargo_toml, found $count\n"
                                unless $count == 1;
                            $inserted = 1;
                            last;
                        }
                    }
                    if (!$inserted) {
                        $cargo .= "\n$target_header\n$dep\n";
                    }
                }

                write_file($cargo_toml, $cargo);
            }

            my $app_extensions = "$ENV{CODEX_SOURCE_DIR}/codex-rs/app-server/src/extensions.rs";
            my $app_extensions_text = read_file($app_extensions);
            my $image_generation_disabled = 0;
            if ($app_extensions_text =~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\n    codex_image_generation_extension::install\(&mut builder, auth_manager\);/) {
                $image_generation_disabled = 1;
            } else {
                my $anchor = "    codex_image_generation_extension::install(&mut builder, auth_manager);\n";
                my $replacement = <<'RUST';
                #[cfg(not(target_os = "freebsd"))]
                codex_image_generation_extension::install(&mut builder, auth_manager);
                #[cfg(target_os = "freebsd")]
                let _ = auth_manager;
            RUST
                my $count = ($app_extensions_text =~ s/\Q$anchor\E/$replacement/);
                if ($count == 1) {
                    write_file($app_extensions, $app_extensions_text);
                    $image_generation_disabled = 1;
                } else {
                    warn "skipping image generation extension disable in $app_extensions: expected one install anchor, found $count\n";
                }
            }

            if ($image_generation_disabled) {
                move_normal_dep_to_non_freebsd_target(
                    "$ENV{CODEX_SOURCE_DIR}/codex-rs/app-server/Cargo.toml",
                    'codex-image-generation-extension = { workspace = true }',
                    "[target.'cfg(windows)'.dependencies]",
                );
            }

            my $history = "$ENV{CODEX_SOURCE_DIR}/codex-rs/core/src/context_manager/history.rs";
            my $history_text = read_file($history);
            my $original_image_estimate_disabled = 0;
            if ($history_text =~ /#\[cfg\(target_os = "freebsd"\)\]\nfn estimate_original_image_bytes\(_image_url: &str\) -> Option<i64>/) {
                $original_image_estimate_disabled = 1;
            } else {
                my $anchor = "fn estimate_original_image_bytes(image_url: &str) -> Option<i64> {\n";
                my $replacement = <<'RUST';
            #[cfg(target_os = "freebsd")]
            fn estimate_original_image_bytes(_image_url: &str) -> Option<i64> {
                None
            }

            #[cfg(not(target_os = "freebsd"))]
            fn estimate_original_image_bytes(image_url: &str) -> Option<i64> {
            RUST
                my $count = ($history_text =~ s/\Q$anchor\E/$replacement/);
                if ($count == 1) {
                    write_file($history, $history_text);
                    $original_image_estimate_disabled = 1;
                } else {
                    warn "skipping original image estimate disable in $history: expected one function anchor, found $count\n";
                }
            }

            if ($original_image_estimate_disabled) {
                move_normal_dep_to_non_freebsd_target(
                    "$ENV{CODEX_SOURCE_DIR}/codex-rs/core/Cargo.toml",
                    'image = { workspace = true, features = ["jpeg", "png", "webp"] }',
                    "[target.'cfg(unix)'.dependencies]",
                );
            }
            EOF

            if [ -d "$CODEX_SOURCE_DIR/codex-rs/utils/image/src" ]; then
              cat > "$CODEX_SOURCE_DIR/codex-rs/utils/image/Cargo.toml" <<'EOF'
            [package]
            name = "codex-utils-image"
            version.workspace = true
            edition.workspace = true
            license.workspace = true

            [lints]
            workspace = true

            [dependencies]
            base64 = { workspace = true }
            thiserror = { workspace = true }

            [lib]
            doctest = false
            EOF

              cat > "$CODEX_SOURCE_DIR/codex-rs/utils/image/src/lib.rs" <<'EOF'
            use std::path::Path;
            use std::sync::Arc;

            use base64::Engine;
            use base64::engine::general_purpose::STANDARD as BASE64_STANDARD;
            use thiserror::Error;

            pub const PROMPT_IMAGE_PATCH_SIZE: u32 = 32;
            pub const MAX_DIMENSION: u32 = 2048;
            pub const MAX_PROMPT_IMAGE_INPUT_BYTES: usize = 1024 * 1024 * 1024;

            #[derive(Debug, Error)]
            pub enum ImageProcessingError {
                #[error("failed to read image at {path}: {source}")]
                Read {
                    path: std::path::PathBuf,
                    #[source]
                    source: std::io::Error,
                },
                #[error("failed to decode image at {path}: {source}")]
                Decode {
                    path: std::path::PathBuf,
                    source: String,
                },
                #[error("failed to encode image as {format}: {source}")]
                Encode { format: String, source: String },
                #[error("unsupported image `{mime}`")]
                UnsupportedImageFormat { mime: String },
                #[error("invalid image data URL: {reason}")]
                InvalidDataUrl { reason: String },
                #[error("image {representation} is too large ({size} bytes; max {max} bytes)")]
                ImageTooLarge {
                    representation: &'static str,
                    size: usize,
                    max: usize,
                },
            }

            impl ImageProcessingError {
                pub fn decode_error(path: &Path, source: impl std::fmt::Display) -> Self {
                    ImageProcessingError::Decode {
                        path: path.to_path_buf(),
                        source: source.to_string(),
                    }
                }


                pub fn is_invalid_image(&self) -> bool {
                    false
                }
            }

            pub mod error {
                pub use crate::ImageProcessingError;
            }

            #[derive(Debug, Clone)]
            pub struct EncodedImage {
                pub bytes: Arc<[u8]>,
                pub mime: String,
                pub width: u32,
                pub height: u32,
            }

            impl EncodedImage {
                pub fn into_data_url(self) -> String {
                    data_url_from_bytes(&self.mime, &self.bytes)
                }
            }

            pub fn data_url_from_bytes(mime: &str, bytes: &[u8]) -> String {
                let encoded = BASE64_STANDARD.encode(bytes);
                format!("data:{mime};base64,{encoded}")
            }

            #[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]
            pub enum PromptImageMode {
                ResizeToFit,
                Original,
                ResizeWithLimits(PromptImageResizeLimits),
            }

            #[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]
            pub struct PromptImageResizeLimits {
                pub max_dimension: u32,
                pub max_patches: usize,
            }

            pub fn load_for_prompt_bytes(
                _path: &Path,
                _file_bytes: Vec<u8>,
                _mode: PromptImageMode,
            ) -> Result<EncodedImage, ImageProcessingError> {
                Err(ImageProcessingError::UnsupportedImageFormat {
                    mime: "image processing disabled in this FreeBSD codex-exec build".to_string(),
                })
            }

            pub fn load_data_url_for_prompt(
                _image_url: &str,
                _mode: PromptImageMode,
            ) -> Result<EncodedImage, ImageProcessingError> {
                Err(ImageProcessingError::UnsupportedImageFormat {
                    mime: "image processing disabled in this FreeBSD codex-exec build".to_string(),
                })
            }
            EOF
            fi

            perl <<'EOF'
            use strict;
            use warnings;

            sub read_file {
                my ($path) = @_;
                open my $in, '<', $path or die "failed to read $path: $!";
                local $/;
                my $text = <$in>;
                close $in;
                return $text;
            }

            sub write_file {
                my ($path, $text) = @_;
                open my $out, '>', $path or die "failed to write $path: $!";
                print {$out} $text;
                close $out;
            }

            sub target_block_has_dep {
                my ($cargo, $target_header, $dep) = @_;
                my $start = index($cargo, "$target_header\n");
                return 0 if $start < 0;
                my $rest = substr($cargo, $start + length($target_header) + 1);
                my ($block) = split(/\n\[/, $rest, 2);
                return $block =~ /^\Q$dep\E$/m;
            }

            sub move_normal_dep_to_non_freebsd_target {
                my ($cargo_toml, $dep, @insert_before_tables) = @_;
                my $target_header = "[target.'cfg(not(target_os = \"freebsd\"))'.dependencies]";
                my $cargo = read_file($cargo_toml);
                return if target_block_has_dep($cargo, $target_header, $dep);

                my $removed = ($cargo =~ s/^\Q$dep\E\n//m);
                if ($removed == 0) {
                    warn "skipping FreeBSD dependency move for $dep in $cargo_toml: normal dependency not found\n";
                    return;
                }
                die "expected one normal dependency $dep in $cargo_toml, found $removed\n"
                    unless $removed == 1;

                if ($cargo =~ /^\Q$target_header\E\n/m) {
                    my $count = ($cargo =~ s/^\Q$target_header\E\n/$target_header\n$dep\n/m);
                    die "expected one FreeBSD-disabled target dependency table in $cargo_toml, found $count\n"
                        unless $count == 1;
                } else {
                    my $inserted = 0;
                    for my $table (@insert_before_tables, "[dev-dependencies]", "[lib]") {
                        my $anchor = "\n$table\n";
                        if ($cargo =~ /\Q$anchor\E/) {
                            my $count = ($cargo =~ s/\Q$anchor\E/\n$target_header\n$dep\n$anchor/);
                            die "expected one insertion anchor $table in $cargo_toml, found $count\n"
                                unless $count == 1;
                            $inserted = 1;
                            last;
                        }
                    }
                    if (!$inserted) {
                        $cargo .= "\n$target_header\n$dep\n";
                    }
                }

                write_file($cargo_toml, $cargo);
            }

            move_normal_dep_to_non_freebsd_target(
                "$ENV{CODEX_SOURCE_DIR}/codex-rs/feedback/Cargo.toml",
                'sentry = { version = "0.46" }',
                "[dev-dependencies]",
                "[lib]",
            );

            my $feedback_lib = "$ENV{CODEX_SOURCE_DIR}/codex-rs/feedback/src/lib.rs";
            my $text = read_file($feedback_lib);
            my $changed = 0;

            if ($text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\nuse anyhow::anyhow;/) {
                my $count = ($text =~ s/^use anyhow::anyhow;\n/#[cfg(not(target_os = "freebsd"))]\nuse anyhow::anyhow;\n/m);
                die "expected one anyhow import in $feedback_lib, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\nuse std::collections::btree_map::Entry;/) {
                my $count = ($text =~ s/^use std::collections::btree_map::Entry;\n/#[cfg(not(target_os = "freebsd"))]\nuse std::collections::btree_map::Entry;\n/m);
                die "expected one Entry import in $feedback_lib, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\nuse std::time::Duration;/) {
                my $count = ($text =~ s/^use std::time::Duration;\n/#[cfg(not(target_os = "freebsd"))]\nuse std::time::Duration;\n/m);
                die "expected one Duration import in $feedback_lib, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\nconst SENTRY_DSN:/) {
                my $anchor = <<'RUST';
            const SENTRY_DSN: &str =
                "https://ae32ed50620d7a7792c1ce5df38b3e3e@o33249.ingest.us.sentry.io/4510195390611458";
            const UPLOAD_TIMEOUT_SECS: u64 = 10;
            RUST
                my $replacement = <<'RUST';
            #[cfg(not(target_os = "freebsd"))]
            const SENTRY_DSN: &str =
                "https://ae32ed50620d7a7792c1ce5df38b3e3e@o33249.ingest.us.sentry.io/4510195390611458";
            #[cfg(not(target_os = "freebsd"))]
            const UPLOAD_TIMEOUT_SECS: u64 = 10;
            RUST
                my $count = ($text =~ s/\Q$anchor\E/$replacement/);
                die "expected one Sentry constants block in $feedback_lib, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /#\[cfg\(target_os = "freebsd"\)\]\n    pub fn upload_feedback/) {
                my $anchor = <<'RUST';
                /// Upload feedback to Sentry with optional attachments.
                pub fn upload_feedback(&self, options: FeedbackUploadOptions<'_>) -> Result<()> {
            RUST
                my $replacement = <<'RUST';
                /// Upload feedback to Sentry with optional attachments.
                #[cfg(target_os = "freebsd")]
                pub fn upload_feedback(&self, _options: FeedbackUploadOptions<'_>) -> Result<()> {
                    let _ = &self.tags;
                    Err(anyhow::anyhow!(
                        "feedback upload is unavailable in this FreeBSD codex-exec build"
                    ))
                }

                /// Upload feedback to Sentry with optional attachments.
                #[cfg(not(target_os = "freebsd"))]
                pub fn upload_feedback(&self, options: FeedbackUploadOptions<'_>) -> Result<()> {
            RUST
                my $count = ($text =~ s/\Q$anchor\E/$replacement/);
                die "expected one upload_feedback function in $feedback_lib, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\n    fn upload_tags/) {
                my $count = ($text =~ s/\n    fn upload_tags\(/\n    #[cfg(not(target_os = "freebsd"))]\n    fn upload_tags\(/);
                die "expected one upload_tags function in $feedback_lib, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\n    fn feedback_attachments/) {
                my $count = ($text =~ s/\n    fn feedback_attachments\(/\n    #[cfg(not(target_os = "freebsd"))]\n    fn feedback_attachments\(/);
                die "expected one feedback_attachments function in $feedback_lib, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /#\[cfg\(not\(target_os = "freebsd"\)\)\]\nfn display_classification/) {
                my $count = ($text =~ s/\nfn display_classification\(/\n#[cfg(not(target_os = "freebsd"))]\nfn display_classification\(/);
                die "expected one display_classification function in $feedback_lib, found $count\n" unless $count == 1;
                $changed = 1;
            }

            write_file($feedback_lib, $text) if $changed;
            EOF

            if [ -d "$CODEX_SOURCE_DIR/codex-rs/utils/oss/src" ]; then
              cat > "$CODEX_SOURCE_DIR/codex-rs/utils/oss/Cargo.toml" <<'EOF'
            [package]
            name = "codex-utils-oss"
            version.workspace = true
            edition.workspace = true
            license.workspace = true

            [lints]
            workspace = true

            [dependencies]
            codex-core = { workspace = true }

            [lib]
            doctest = false
            EOF

              cat > "$CODEX_SOURCE_DIR/codex-rs/utils/oss/src/lib.rs" <<'EOF'
            //! OSS provider utilities are disabled in this FreeBSD codex-exec build.

            use codex_core::config::Config;

            pub fn get_default_model_for_oss_provider(_provider_id: &str) -> Option<&'static str> {
                None
            }

            pub async fn ensure_oss_provider_ready(
                provider_id: &str,
                _config: &Config,
            ) -> Result<(), std::io::Error> {
                Err(std::io::Error::other(format!(
                    "OSS provider `{provider_id}` is unavailable in this FreeBSD codex-exec build"
                )))
            }
            EOF
            fi

            cat > "$CODEX_SOURCE_DIR/codex-rs/code-mode/Cargo.toml" <<'EOF'
            [package]
            edition.workspace = true
            license.workspace = true
            name = "codex-code-mode"
            version.workspace = true

            [lib]
            doctest = false
            name = "codex_code_mode"
            path = "src/lib.rs"

            [lints]
            workspace = true

            [dependencies]
            codex-code-mode-protocol = { workspace = true }
            tokio = { workspace = true, features = ["sync"] }
            tokio-util = { workspace = true, features = ["rt"] }
            EOF

            cat > "$CODEX_SOURCE_DIR/codex-rs/code-mode/src/lib.rs" <<'EOF'
            use std::sync::Arc;

            pub use codex_code_mode_protocol::*;
            use tokio::sync::oneshot;
            use tokio_util::sync::CancellationToken;

            const UNAVAILABLE: &str =
                "code mode is unavailable on FreeBSD because rusty_v8 does not publish x86_64-unknown-freebsd binaries";

            pub struct NoopCodeModeSessionDelegate;

            impl CodeModeSessionDelegate for NoopCodeModeSessionDelegate {
                fn invoke_tool<'a>(
                    &'a self,
                    _invocation: CodeModeNestedToolCall,
                    _cancellation_token: CancellationToken,
                ) -> ToolInvocationFuture<'a> {
                    Box::pin(async { Err(UNAVAILABLE.to_string()) })
                }

                fn notify<'a>(
                    &'a self,
                    _call_id: String,
                    _cell_id: CellId,
                    _text: String,
                    _cancellation_token: CancellationToken,
                ) -> NotificationFuture<'a> {
                    Box::pin(async { Ok(()) })
                }

                fn cell_closed(&self, _cell_id: &CellId) {}
            }

            #[derive(Default)]
            pub struct InProcessCodeModeSessionProvider;

            impl CodeModeSessionProvider for InProcessCodeModeSessionProvider {
                fn create_session<'a>(
                    &'a self,
                    delegate: Arc<dyn CodeModeSessionDelegate>,
                ) -> CodeModeSessionProviderFuture<'a> {
                    Box::pin(async move {
                        let session: Arc<dyn CodeModeSession> =
                            Arc::new(CodeModeService::with_delegate(delegate));
                        Ok(session)
                    })
                }
            }

            pub struct CodeModeService {
                _delegate: Arc<dyn CodeModeSessionDelegate>,
            }

            impl CodeModeService {
                pub fn new() -> Self {
                    Self::with_delegate(Arc::new(NoopCodeModeSessionDelegate))
                }

                pub fn with_delegate(delegate: Arc<dyn CodeModeSessionDelegate>) -> Self {
                    Self { _delegate: delegate }
                }

                pub async fn execute(&self, request: ExecuteRequest) -> Result<StartedCell, String> {
                    let cell_id = CellId::new(request.tool_call_id);
                    let (response_tx, response_rx) = oneshot::channel();
                    let _ = response_tx.send(Ok(unavailable_response(cell_id.clone())));
                    Ok(StartedCell::from_result_receiver(cell_id, response_rx))
                }

                pub async fn execute_to_pending(
                    &self,
                    request: ExecuteRequest,
                ) -> Result<ExecuteToPendingOutcome, String> {
                    Ok(ExecuteToPendingOutcome::Completed(unavailable_response(
                        CellId::new(request.tool_call_id),
                    )))
                }

                pub async fn wait(&self, request: WaitRequest) -> Result<WaitOutcome, String> {
                    Ok(WaitOutcome::MissingCell(unavailable_response(request.cell_id)))
                }

                pub async fn terminate(&self, cell_id: CellId) -> Result<WaitOutcome, String> {
                    Ok(WaitOutcome::MissingCell(unavailable_response(cell_id)))
                }

                pub async fn wait_to_pending(
                    &self,
                    request: WaitToPendingRequest,
                ) -> Result<WaitToPendingOutcome, String> {
                    Ok(WaitToPendingOutcome::MissingCell(unavailable_response(

                        request.cell_id,
                    )))
                }

                pub async fn shutdown(&self) -> Result<(), String> {
                    Ok(())
                }
            }


            impl Default for CodeModeService {
                fn default() -> Self {
                    Self::new()
                }
            }

            impl CodeModeSession for CodeModeService {
                fn is_alive(&self) -> bool {
                    true
                }

                fn execute<'a>(
                    &'a self,
                    request: ExecuteRequest,
                ) -> CodeModeSessionResultFuture<'a, StartedCell> {
                    Box::pin(CodeModeService::execute(self, request))
                }

                fn wait<'a>(
                    &'a self,
                    request: WaitRequest,
                ) -> CodeModeSessionResultFuture<'a, WaitOutcome> {
                    Box::pin(CodeModeService::wait(self, request))
                }

                fn terminate<'a>(
                    &'a self,
                    cell_id: CellId,
                ) -> CodeModeSessionResultFuture<'a, WaitOutcome> {
                    Box::pin(CodeModeService::terminate(self, cell_id))
                }

                fn shutdown<'a>(&'a self) -> CodeModeSessionResultFuture<'a, ()> {
                    Box::pin(CodeModeService::shutdown(self))
                }
            }

            fn unavailable_response(cell_id: CellId) -> RuntimeResponse {
                RuntimeResponse::Result {
                    cell_id,
                    content_items: Vec::new(),
                    error_text: Some(UNAVAILABLE.to_string()),
                }
            }
            EOF

            (
              cd "$CODEX_SOURCE_DIR/codex-rs"
              cargo build \
                --release \
                --package codex-exec \
                --bin codex-exec \
                --target "$TARGET" \
                --jobs "$CARGO_BUILD_JOBS"
            )

            strip -s "$CODEX_SOURCE_DIR/codex-rs/target/$TARGET/release/codex-exec"

            mkdir -p dist
            cp "$CODEX_SOURCE_DIR/codex-rs/target/$TARGET/release/codex-exec" \
              "dist/codex-exec-$TARGET"
            chmod +x "dist/codex-exec-$TARGET"
            rm -rf "$CODEX_SOURCE_DIR" "$CODEX_SOURCE_DIR.zip" rustup-init.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-exec-x86_64-unknown-freebsd
          path: dist/codex-exec-x86_64-unknown-freebsd
          if-no-files-found: error
