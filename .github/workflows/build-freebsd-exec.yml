name: Build FreeBSD codex-exec

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-freebsd-exec.yml"

permissions:
  contents: read

jobs:
  build:
    name: x86_64-unknown-freebsd
    runs-on: ubuntu-latest

    env:
      CODEX_SOURCE_URL: https://github.com/openai/codex/archive/refs/tags/rust-v0.142.4.zip
      CODEX_SOURCE_DIR: codex-rust-v0.142.4
      TARGET: x86_64-unknown-freebsd
      RUST_TOOLCHAIN: 1.95.0
      CARGO_BUILD_JOBS: 1
      CARGO_TERM_COLOR: always

    steps:
      - name: Build codex-exec in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          envs: "CODEX_SOURCE_URL CODEX_SOURCE_DIR TARGET RUST_TOOLCHAIN CARGO_BUILD_JOBS CARGO_TERM_COLOR"
          prepare: |
            pkg install -y curl ca_root_nss unzip cmake gmake perl5 pkgconf dbus
          run: |
            set -eu

            rm -rf "$CODEX_SOURCE_DIR" "$CODEX_SOURCE_DIR.zip" dist

            curl --proto '=https' --tlsv1.2 --fail --retry 3 -sSf \
              -o rustup-init.sh \
              https://sh.rustup.rs
            sh rustup-init.sh -y \
              --profile minimal \
              --default-toolchain "$RUST_TOOLCHAIN" \
              --target "$TARGET" \
              --component rust-src
            . "$HOME/.cargo/env"

            curl -L --fail --retry 3 --retry-delay 5 \
              -o "$CODEX_SOURCE_DIR.zip" \
              "$CODEX_SOURCE_URL"
            unzip -q "$CODEX_SOURCE_DIR.zip"

            perl <<'EOF'
            use strict;
            use warnings;

            my $src = "$ENV{CODEX_SOURCE_DIR}/codex-rs/exec/src/event_processor_with_human_output.rs";
            open my $in, '<', $src or die "failed to read $src: $!";
            local $/;
            my $text = <$in>;
            close $in;

            my $changed = 0;

            my $helpers = <<'RUST';

            fn ring_terminal_bell() {
                let mut stderr = std::io::stderr();
                if std::io::IsTerminal::is_terminal(&stderr) {
                    let _ = std::io::Write::write_all(&mut stderr, b"\x07");
                    let _ = std::io::Write::flush(&mut stderr);
                }
            }

            fn cache_hit_rate_line(input_tokens: i64, cached_input_tokens: i64) -> String {
                let input = input_tokens.max(0);
                let cached = cached_input_tokens.max(0).min(input);
                if input == 0 {
                    return "cache hit: n/a (0 input tokens)".to_string();
                }

                let rate = cached as f64 * 100.0 / input as f64;
                format!(
                    "cache hit: {rate:.1}% ({}/{})",
                    codex_protocol::num_format::format_with_separators(cached),
                    codex_protocol::num_format::format_with_separators(input)
                )
            }
            RUST

            if ($text !~ /fn ring_terminal_bell\(/) {
                $text .= $helpers;
                $changed = 1;
            }

            if ($text !~ /cache_hit_rate_line\(notification\.token_usage\.last\.input_tokens/) {
                my $anchor = '                self.last_total_token_usage = Some(notification.token_usage);';
                my $replacement =
                    '                eprintln!("{}", cache_hit_rate_line(notification.token_usage.last.input_tokens, notification.token_usage.last.cached_input_tokens));' . "\n" .
                    $anchor;
                my $count = ($text =~ s/\Q$anchor\E/$replacement/g);
                die "expected exactly one token usage update anchor in $src, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($text !~ /fn print_final_output\(&mut self\) \{\n        ring_terminal_bell\(\);/) {
                my $anchor = "    fn print_final_output(&mut self) {\n";
                my $replacement = $anchor . "        ring_terminal_bell();\n";
                my $count = ($text =~ s/\Q$anchor\E/$replacement/g);
                die "expected exactly one final output anchor in $src, found $count\n" unless $count == 1;
                $changed = 1;
            }

            if ($changed) {
                open my $out, '>', $src or die "failed to write $src: $!";
                print {$out} $text;
                close $out;
            }
            EOF

            cat > "$CODEX_SOURCE_DIR/codex-rs/code-mode/Cargo.toml" <<'EOF'
            [package]
            edition.workspace = true
            license.workspace = true
            name = "codex-code-mode"
            version.workspace = true

            [lib]
            doctest = false
            name = "codex_code_mode"
            path = "src/lib.rs"

            [lints]
            workspace = true

            [dependencies]
            codex-code-mode-protocol = { workspace = true }
            tokio = { workspace = true, features = ["sync"] }
            tokio-util = { workspace = true, features = ["rt"] }
            EOF

            cat > "$CODEX_SOURCE_DIR/codex-rs/code-mode/src/lib.rs" <<'EOF'
            use std::sync::Arc;

            pub use codex_code_mode_protocol::*;
            use tokio::sync::oneshot;
            use tokio_util::sync::CancellationToken;

            const UNAVAILABLE: &str =
                "code mode is unavailable on FreeBSD because rusty_v8 does not publish x86_64-unknown-freebsd binaries";

            pub struct NoopCodeModeSessionDelegate;

            impl CodeModeSessionDelegate for NoopCodeModeSessionDelegate {
                fn invoke_tool<'a>(
                    &'a self,
                    _invocation: CodeModeNestedToolCall,
                    _cancellation_token: CancellationToken,
                ) -> ToolInvocationFuture<'a> {
                    Box::pin(async { Err(UNAVAILABLE.to_string()) })
                }

                fn notify<'a>(
                    &'a self,
                    _call_id: String,
                    _cell_id: CellId,
                    _text: String,
                    _cancellation_token: CancellationToken,
                ) -> NotificationFuture<'a> {
                    Box::pin(async { Ok(()) })
                }

                fn cell_closed(&self, _cell_id: &CellId) {}
            }

            #[derive(Default)]
            pub struct InProcessCodeModeSessionProvider;

            impl CodeModeSessionProvider for InProcessCodeModeSessionProvider {
                fn create_session<'a>(
                    &'a self,
                    delegate: Arc<dyn CodeModeSessionDelegate>,
                ) -> CodeModeSessionProviderFuture<'a> {
                    Box::pin(async move {
                        let session: Arc<dyn CodeModeSession> =
                            Arc::new(CodeModeService::with_delegate(delegate));
                        Ok(session)
                    })
                }
            }

            pub struct CodeModeService {
                _delegate: Arc<dyn CodeModeSessionDelegate>,
            }

            impl CodeModeService {
                pub fn new() -> Self {
                    Self::with_delegate(Arc::new(NoopCodeModeSessionDelegate))
                }

                pub fn with_delegate(delegate: Arc<dyn CodeModeSessionDelegate>) -> Self {
                    Self { _delegate: delegate }
                }

                pub async fn execute(&self, request: ExecuteRequest) -> Result<StartedCell, String> {
                    let cell_id = CellId::new(request.tool_call_id);
                    let (response_tx, response_rx) = oneshot::channel();
                    let _ = response_tx.send(Ok(unavailable_response(cell_id.clone())));
                    Ok(StartedCell::from_result_receiver(cell_id, response_rx))
                }

                pub async fn execute_to_pending(
                    &self,
                    request: ExecuteRequest,
                ) -> Result<ExecuteToPendingOutcome, String> {
                    Ok(ExecuteToPendingOutcome::Completed(unavailable_response(
                        CellId::new(request.tool_call_id),
                    )))
                }

                pub async fn wait(&self, request: WaitRequest) -> Result<WaitOutcome, String> {
                    Ok(WaitOutcome::MissingCell(unavailable_response(request.cell_id)))
                }

                pub async fn terminate(&self, cell_id: CellId) -> Result<WaitOutcome, String> {
                    Ok(WaitOutcome::MissingCell(unavailable_response(cell_id)))
                }

                pub async fn wait_to_pending(
                    &self,
                    request: WaitToPendingRequest,
                ) -> Result<WaitToPendingOutcome, String> {
                    Ok(WaitToPendingOutcome::MissingCell(unavailable_response(

                        request.cell_id,
                    )))
                }

                pub async fn shutdown(&self) -> Result<(), String> {
                    Ok(())
                }
            }

            impl Default for CodeModeService {
                fn default() -> Self {
                    Self::new()
                }
            }

            impl CodeModeSession for CodeModeService {
                fn is_alive(&self) -> bool {
                    true
                }

                fn execute<'a>(
                    &'a self,
                    request: ExecuteRequest,
                ) -> CodeModeSessionResultFuture<'a, StartedCell> {
                    Box::pin(CodeModeService::execute(self, request))
                }

                fn wait<'a>(
                    &'a self,
                    request: WaitRequest,
                ) -> CodeModeSessionResultFuture<'a, WaitOutcome> {
                    Box::pin(CodeModeService::wait(self, request))
                }

                fn terminate<'a>(
                    &'a self,
                    cell_id: CellId,
                ) -> CodeModeSessionResultFuture<'a, WaitOutcome> {
                    Box::pin(CodeModeService::terminate(self, cell_id))
                }

                fn shutdown<'a>(&'a self) -> CodeModeSessionResultFuture<'a, ()> {
                    Box::pin(CodeModeService::shutdown(self))
                }
            }

            fn unavailable_response(cell_id: CellId) -> RuntimeResponse {
                RuntimeResponse::Result {
                    cell_id,
                    content_items: Vec::new(),
                    error_text: Some(UNAVAILABLE.to_string()),
                }
            }
            EOF

            pkgconf --modversion dbus-1

            (
              cd "$CODEX_SOURCE_DIR/codex-rs"
              cargo build \
                --release \
                --package codex-exec \
                --bin codex-exec \
                --target "$TARGET" \
                --jobs "$CARGO_BUILD_JOBS"
            )

            strip -s "$CODEX_SOURCE_DIR/codex-rs/target/$TARGET/release/codex-exec"

            mkdir -p dist
            cp "$CODEX_SOURCE_DIR/codex-rs/target/$TARGET/release/codex-exec" \
              "dist/codex-exec-$TARGET"
            chmod +x "dist/codex-exec-$TARGET"
            rm -rf "$CODEX_SOURCE_DIR" "$CODEX_SOURCE_DIR.zip" rustup-init.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-exec-x86_64-unknown-freebsd
          path: dist/codex-exec-x86_64-unknown-freebsd
          if-no-files-found: error
